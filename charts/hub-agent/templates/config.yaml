{{- if .Values.additionalConfigData }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hub-agent.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hub-agent.labels" . | nindent 4 }}
data:
  {{- .Values.additionalConfigData | toYaml | nindent 2 }}
{{- end }}
