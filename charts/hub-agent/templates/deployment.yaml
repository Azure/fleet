{{- if and (not .Values.useCertManager) (gt (.Values.replicaCount | int) 1) }}
{{- fail "ERROR: replicaCount > 1 requires useCertManager=true (self-signed certificates cannot be shared across replicas)" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hub-agent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hub-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hub-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hub-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "hub-agent.fullname" . }}-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        {{- if .Values.crdInstaller.enabled }}
        - name: crd-installer
          image: "{{ .Values.crdInstaller.image.repository }}:{{ .Values.crdInstaller.image.tag }}"
          imagePullPolicy: {{ .Values.crdInstaller.image.pullPolicy }}
          args:
            - --mode=hub
            - --v={{ .Values.crdInstaller.logVerbosity }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - --leader-elect=true
            - --enable-webhook={{ .Values.enableWebhook }}
            - --webhook-service-name={{ .Values.webhookServiceName }}
            - --enable-guard-rail={{ .Values.enableGuardRail }}
            - --enable-workload={{ .Values.enableWorkload }}
            - --use-cert-manager={{ .Values.useCertManager }}
            - --whitelisted-users=system:serviceaccount:{{ .Values.namespace }}:{{ include "hub-agent.fullname" . }}-sa
            - --webhook-client-connection-type={{.Values.webhookClientConnectionType}}
            - --v={{ .Values.logVerbosity }}
            - -add_dir_header
            - --enable-cluster-inventory-apis={{ .Values.enableClusterInventoryAPI }}
            - --enable-staged-update-run-apis={{ .Values.enableStagedUpdateRunAPIs }}
            - --enable-eviction-apis={{ .Values.enableEvictionAPIs}}
            - --enable-pprof={{ .Values.enablePprof }}
            - --pprof-port={{ .Values.pprofPort }}
            - --max-concurrent-cluster-placement={{ .Values.MaxConcurrentClusterPlacement }}
            - --concurrent-resource-change-syncs={{ .Values.ConcurrentResourceChangeSyncs }}
            - --log_file_max_size={{ .Values.logFileMaxSize }}
            - --max-fleet-size={{ .Values.MaxFleetSizeSupported }}
            - --hub-api-qps={{ .Values.hubAPIQPS }}
            - --hub-api-burst={{ .Values.hubAPIBurst }}
            - --force-delete-wait-time={{ .Values.forceDeleteWaitTime }}
            - --cluster-unhealthy-threshold={{ .Values.clusterUnhealthyThreshold }}
            - --resource-snapshot-creation-minimum-interval={{ .Values.resourceSnapshotCreationMinimumInterval }}
            - --resource-changes-collection-duration={{ .Values.resourceChangesCollectionDuration }}
            - --enable-admission-policy-manager={{ .Values.enableAdmissionPolicyManager }}
            {{- if and .Values.admissionPolicyManagerConfigName (not .Values.additionalConfigData) }}
            {{- fail "ERROR: admissionPolicyManagerConfigName is set but additionalConfigData is empty; must provide admission policy manager configuration data" }}
            {{- end }}
            {{- if and .Values.additionalConfigData .Values.admissionPolicyManagerConfigName }}
            - --admission-policy-manager-config={{ .Values.additionalConfigDataMountPath }}/{{ .Values.admissionPolicyManagerConfigName }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: healthz
              containerPort: 8081
              protocol: TCP
            {{- if .Values.enablePprof }}
            - containerPort: {{ .Values.pprofPort }}
              name: pprof
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
          env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.useCertManager }}
          volumeMounts:
          - name: webhook-cert
            # This path must match FleetWebhookCertDir in pkg/webhook/webhook.go
            mountPath: /tmp/k8s-webhook-server/serving-certs
            readOnly: true
          {{- if .Values.additionalConfigData }}
          - name: additional-config
            mountPath: {{ .Values.additionalConfigDataMountPath }}
            readOnly: true
          {{- end }}
          {{- else }}
          volumeMounts:
          - name: webhook-cert
            # This path must match FleetWebhookCertDir in pkg/webhook/webhook.go.
            # Note that this must be mounted one level up from the hardcoded path, otherwise
            # the read only root filesystem setup would block the agent from attempting to
            # clear the directory.
            mountPath: /tmp/k8s-webhook-server/
          {{- if .Values.additionalConfigData }}
          - name: additional-config
            mountPath: {{ .Values.additionalConfigDataMountPath }}
            readOnly: true
          {{- end }}
          {{- end }}
      volumes:
      - name: webhook-cert
        {{- if .Values.useCertManager }}
        secret:
          secretName: {{ .Values.webhookCertSecretName }}
          # defaultMode 0444 (read for all) allows the container process to read the certs
          # regardless of the user/group it runs as
          defaultMode: 0444
        {{- else }}
        emptyDir: {}
        {{- end }}
      {{- if .Values.additionalConfigData }}
      - name: additional-config
        configMap:
          name: {{ include "hub-agent.fullname" . }}-config
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
