# Add tag arc.fleetagent to logs from fleet agents, which are running under CCP namespaces.
<match arc-extension.fleet-agent.**>
    @type rewrite_tag_filter
    <rule>
        key namespace
        pattern ^.*$
        tag arc.fleetagent
    </rule>
</match>