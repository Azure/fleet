apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-member-agent
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: fleet-member-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-member-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-member-agent
    spec:
      serviceAccountName: fleet-member-agent-sa
      {{- if .Values.crdinstaller.enabled }}
      initContainers:
        - name: crd-installer
          imagePullPolicy: IfNotPresent
          image: "{{ .Values.crdinstaller.repository }}:{{ .Values.crdinstaller.tag }}"
          args:
            - --mode=arcMember
            - --v={{ .Values.crdinstaller.logVerbosity }}
          securityContext:
            capabilities:
              drop:
                - ALL
      {{- end }}
      containers:
        - name: addon-token-adapter
          imagePullPolicy: IfNotPresent
          env:
          - name: TOKEN_NAMESPACE    
            value: "fleet-system"
{{-  .Values.Azure.Identity.MSIAdapterYaml | nindent 10 }}
        - name: refresh-token
          image: "{{ .Values.refreshtoken.repository }}:{{ .Values.refreshtoken.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - azure
            - --clientid=any-client-id
            - --scope={{ .Values.config.scope }}
            - --v={{ .Values.logVerbosity }}
          resources:
            limits:
              cpu: 50m
              memory: 128Mi
            requests:
              cpu: 1m
              memory: 16Mi
          securityContext:
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: provider-token
              mountPath: /config
        - name: fleet-member-agent
          image: "{{ .Values.memberagent.repository }}:{{ .Values.memberagent.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --v={{ .Values.logVerbosity }}
            - -add_dir_header
            {{- if .Values.propertyProvider }}
            - --property-provider={{ .Values.propertyProvider }}
            {{- end }}
          env:
            - name: HUB_SERVER_URL
              value: {{ .Values.config.hubURL | quote }}
            - name: CONFIG_PATH
              value: /config/token
            - name: MEMBER_CLUSTER_NAME
              value: {{ .Values.config.memberClusterName | quote }}
            {{- if .Values.config.hubCA }}
            - name: HUB_CERTIFICATE_AUTHORITY
              value: {{ .Values.config.hubCA | quote }}
            {{- end }}
            {{- if .Values.Azure.proxySettings.isProxyEnabled }}
            - name: HTTPS_PROXY
              value: {{ .Values.Azure.proxySettings.httpProxy | quote }}
            - name: NO_PROXY
              value: {{ .Values.Azure.proxySettings.noProxy | quote }}
            {{- end }}
            {{- if and .Values.Azure.proxySettings.isProxyEnabled .Values.Azure.proxySettings.proxyCert }}
            - name: SSL_CERT_FILE
              value: /usr/local/share/ca-certificates/azure-proxy-cert.crt
            {{- end }}
          ports:
            - containerPort: 8080
              name: hubmetrics
              protocol: TCP
            - containerPort: 8081
              name: hubhealthz
              protocol: TCP
            - containerPort: 8090
              name: membermetrics
              protocol: TCP
            - containerPort: 8091
              name: memberhealthz
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: hubhealthz
          readinessProbe:
            httpGet:
              path: /readyz
              port: hubhealthz
          resources:
            limits:
              cpu: 1
              memory: 2Gi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            capabilities:
              drop:
                - ALL
          volumeMounts:
          - name: provider-token 
            mountPath: /config
          {{- if and .Values.Azure.proxySettings.isProxyEnabled .Values.Azure.proxySettings.proxyCert }}
          - name: azure-proxy-cert-store
            mountPath: /usr/local/share/ca-certificates/azure-proxy-cert.crt
            subPath: azure-proxy-cert.crt
            readOnly: true
          {{- end }}
        - name: mdsd
          image: "{{ .Values.geneva.mdsd.repository }}:{{ .Values.geneva.mdsd.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: ENABLE_GIG_BRIDGE_MODE
              value: {{ .Values.geneva.config.enableGigBridgeMode | quote }}
            - name: MONITORING_GCS_ENVIRONMENT
              value: {{ .Values.geneva.gcs.environment | quote }}
            - name: MONITORING_GCS_ACCOUNT
              value: {{ .Values.geneva.gcs.account | quote }}
            - name: MONITORING_GCS_REGION
              value: {{ .Values.geneva.gcs.region | quote }}
            - name: MONITORING_GCS_NAMESPACE
              value: {{ .Values.geneva.gcs.namespace | quote }}
            - name: MONITORING_CONFIG_VERSION
              value: {{ .Values.geneva.gcs.configVersion | quote }}
            - name: MONITORING_GCS_AUTH_ID_TYPE
              value: {{ .Values.geneva.gcs.authIdType | quote }}
            - name: MONITORING_TENANT
              value: {{ .Values.geneva.config.tenant | quote }}
            - name: MONITORING_ROLE
              value: {{ .Values.geneva.config.role | quote }}
            - name: MONITORING_ROLE_INSTANCE
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DOCKER_LOGGING
              value: {{ .Values.geneva.debugging.dockerLogging | quote }}
            - name: SKIP_IMDS_LOOKUP_FOR_LEGACY_AUTH
              value: "true"
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: mdsd-run-vol
              mountPath: /var/run/mdsd
            - name: mdsd-logs-vol
              mountPath: /geneva/geneva_logs
        - name: fluentd
          image: "{{ .Values.geneva.fluentd.repository }}:{{ .Values.geneva.fluentd.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: FLUENTD_CONF
              value: /etc/fluentd/fluentd.conf
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: fluentd-conf-vol
              mountPath: /etc/fluentd
            - name: fluentd-buffer-vol
              mountPath: /var/log/td-agent
            - name: mdsd-run-vol
              mountPath: /var/run/mdsd
            - name: docker-log-vol
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: var-log-vol
              mountPath: /var/log
            - name: run-journal-vol
              mountPath: /run/log/journal
              readOnly: true
        - name: mdm
          image: "{{ .Values.geneva.mdm.repository }}:{{ .Values.geneva.mdm.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: ROLEINSTANCE
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CONFIG_OVERRIDES_FILE
              value: /tmp/geneva_mdm/mdmconfig.json
            - name: MDM_INPUT
              value: influxdb_udp
            - name: MDM_LOG_LEVEL
              value: "Info"
            - name: MDM_ACCOUNT
              value: {{ .Values.geneva.mdm.account | quote }}
            - name: ME_AZURE_ENV
              value: {{ .Values.geneva.config.azureEnvironment | quote }}
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: mdm-config
              mountPath: /tmp/geneva_mdm
      volumes:
      - name: provider-token
        emptyDir: { }
      {{- if and .Values.Azure.proxySettings.isProxyEnabled .Values.Azure.proxySettings.proxyCert }}
      - name: azure-proxy-cert-store
        secret:
          secretName: azure-proxy-cert
      {{- end }}
      - name: mdsd-run-vol
        emptyDir: {}
      - name: mdsd-logs-vol
        emptyDir: {}
      - name: fluentd-conf-vol
        configMap:
          name: fluentd-config
      - name: fluentd-buffer-vol
        emptyDir: {}
      - name: docker-log-vol
        hostPath:
          path: /var/lib/docker/containers
      - name: var-log-vol
        hostPath:
          path: /var/log
      - name: run-journal-vol
        hostPath:
          path: /run/log/journal
      - name: mdm-config
        configMap:
          name: mdm-config
---
